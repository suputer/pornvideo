<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Dezvi — видео лента</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000000;
            color: #ffffff;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 6px;
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 10px;
        }

        .header {
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px 20px;
            z-index: 100;
        }

        .header-content {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #a855f7);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .search-icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 18px;
            transition: transform 0.2s;
        }

        .search-icon-btn:active {
            transform: scale(0.95);
        }

        /* Pull to refresh - кружок */
        .ptr-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            z-index: 90;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            transform: translateY(-100%);
            transition: transform 0.2s ease;
        }

        .ptr-spinner {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
        }

        .ptr-spinner i {
            font-size: 20px;
            color: white;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .fa-spin {
            animation: spin 0.8s linear infinite;
        }

        /* Search Bar */
        .search-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            padding: 16px 20px;
            transform: translateY(-100%);
            transition: transform 0.3s;
            z-index: 150;
            border-bottom: 1px solid rgba(168, 85, 247, 0.3);
        }

        .search-bar.active {
            transform: translateY(0);
        }

        .search-bar-content {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
        }

        .search-bar-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 12px 18px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .search-bar-input:focus {
            border-color: #a855f7;
        }

        .search-submit-btn, .search-close-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            color: white;
            cursor: pointer;
            font-size: 18px;
            transition: transform 0.2s;
        }

        .search-submit-btn:active, .search-close-btn:active {
            transform: scale(0.95);
        }

        .search-submit-btn {
            background: #a855f7;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 140;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .main-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .video-card {
            background: #0a0a0a;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s;
            opacity: 0;
            transform: translateY(30px);
            animation: cardAppear 0.5s forwards;
        }

        @keyframes cardAppear {
            to { opacity: 1; transform: translateY(0); }
        }

        .video-card:active {
            transform: scale(0.98);
        }

        .preview-wrapper {
            position: relative;
            cursor: pointer;
        }

        .preview-img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .preview-wrapper:active .play-overlay {
            opacity: 1;
        }

        .play-icon {
            width: 50px;
            height: 50px;
            background: rgba(168, 85, 247, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .video-info {
            padding: 16px;
        }

        .video-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .watch-btn {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: transform 0.2s;
        }

        .watch-btn:active {
            transform: scale(0.97);
        }

        .skeleton-card {
            background: #0a0a0a;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .skeleton-img {
            background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            aspect-ratio: 16/9;
        }

        .skeleton-text {
            padding: 16px;
        }

        .skeleton-title {
            height: 20px;
            background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .skeleton-btn {
            height: 44px;
            background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 12px;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .empty-state, .error-state {
            text-align: center;
            padding: 80px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 30px;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .retry-btn {
            margin-top: 20px;
            padding: 10px 24px;
            background: #7c3aed;
            border: none;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }

        @media (max-width: 640px) {
            .main-content { padding: 16px; }
            .videos-grid { gap: 16px; }
            .logo { font-size: 24px; }
        }
    </style>
</head>
<body>
    <!-- Pull to refresh кружок -->
    <div class="ptr-container" id="ptrContainer">
        <div class="ptr-spinner">
            <i class="fas fa-sync-alt"></i>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="search-bar" id="searchBar">
        <div class="search-bar-content">
            <button class="search-close-btn" id="searchCloseBtn"><i class="fas fa-times"></i></button>
            <input type="text" class="search-bar-input" id="searchInput" placeholder="Поиск видео...">
            <button class="search-submit-btn" id="searchSubmitBtn"><i class="fas fa-search"></i></button>
        </div>
    </div>

    <div class="header">
        <div class="header-content">
            <div class="logo">Dezvi</div>
            <button class="search-icon-btn" id="searchIconBtn"><i class="fas fa-search"></i></button>
        </div>
    </div>

    <div class="main-content">
        <div id="videosContainer"></div>
    </div>

    <script>
        // ===== ВСТАВЬ СВОЮ ССЫЛКУ ОТ CLOUDFLARE =====
        const API_URL = 'https://harrison-much-tractor-superintendent.trycloudflare.com/videos';
        // =================================================
        
        let allVideos = [];
        let isLoading = false;
        let currentSearchTerm = '';
        let isSearchActive = false;
        
        // Pull to refresh переменные
        let touchStartY = 0;
        let touchMoveY = 0;
        let isPulling = false;
        let isRefreshing = false;
        const ptrContainer = document.getElementById('ptrContainer');

        const searchBar = document.getElementById('searchBar');
        const overlay = document.getElementById('overlay');
        const searchInput = document.getElementById('searchInput');
        const videosContainer = document.getElementById('videosContainer');

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function showSkeleton() {
            videosContainer.innerHTML = `
                <div class="videos-grid">
                    ${Array(6).fill(0).map(() => `
                        <div class="skeleton-card">
                            <div class="skeleton-img"></div>
                            <div class="skeleton-text">
                                <div class="skeleton-title"></div>
                                <div class="skeleton-btn"></div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderVideos() {
            let videosToRender = allVideos;
            if (isSearchActive && currentSearchTerm.trim() !== '') {
                videosToRender = allVideos.filter(v => 
                    v.title.toLowerCase().includes(currentSearchTerm.toLowerCase())
                );
            }
            
            if (videosToRender.length === 0 && allVideos.length > 0 && isSearchActive) {
                videosContainer.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-search"></i></div><div class="empty-title">Ничего не найдено</div></div>`;
                return;
            }
            
            if (videosToRender.length === 0) {
                videosContainer.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-video"></i></div><div class="empty-title">Нет видео</div><div class="empty-text">Добавьте видео через Telegram-бота</div></div>`;
                return;
            }

            videosContainer.innerHTML = `
                <div class="videos-grid">
                    ${videosToRender.map((video, i) => `
                        <div class="video-card" style="animation-delay: ${i * 0.03}s">
                            <div class="preview-wrapper" onclick="window.open('${escapeHtml(video.url)}', '_blank')">
                                <img class="preview-img" src="data:image/jpeg;base64,${video.preview_base64}" loading="lazy">
                                <div class="play-overlay"><div class="play-icon"><i class="fas fa-play"></i></div></div>
                            </div>
                            <div class="video-info">
                                <div class="video-title">${escapeHtml(video.title)}</div>
                                <a href="${escapeHtml(video.url)}" target="_blank" class="watch-btn"><i class="fas fa-play-circle"></i> Смотреть</a>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function fetchVideos(showSkeletonEffect = true) {
            if (isLoading) return;
            isLoading = true;
            if (showSkeletonEffect) showSkeleton();

            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                allVideos = await response.json();
                renderVideos();
            } catch (error) {
                videosContainer.innerHTML = `<div class="error-state"><div class="empty-icon"><i class="fas fa-exclamation-triangle"></i></div><div class="empty-title">Ошибка: ${error.message}</div><button class="retry-btn" onclick="location.reload()">🔄 Повторить</button></div>`;
            } finally {
                isLoading = false;
            }
        }

        // Pull to refresh logic
        function handleTouchStart(e) {
            if (window.scrollY === 0 && !isRefreshing && !searchBar.classList.contains('active')) {
                touchStartY = e.touches[0].clientY;
                isPulling = true;
            }
        }

        function handleTouchMove(e) {
            if (!isPulling || isRefreshing) return;
            
            touchMoveY = e.touches[0].clientY;
            const pullDistance = touchMoveY - touchStartY;
            
            if (pullDistance > 0 && window.scrollY === 0) {
                e.preventDefault();
                const translateY = Math.min(pullDistance, 80);
                ptrContainer.style.transform = `translateY(${translateY}px)`;
            }
        }

        async function handleTouchEnd(e) {
            if (!isPulling || isRefreshing) {
                isPulling = false;
                ptrContainer.style.transform = 'translateY(-100%)';
                return;
            }
            
            isPulling = false;
            const pullDistance = touchMoveY - touchStartY;
            
            if (pullDistance > 60) {
                isRefreshing = true;
                ptrContainer.style.transform = 'translateY(40px)';
                const spinnerIcon = ptrContainer.querySelector('i');
                spinnerIcon.classList.add('fa-spin');
                
                await fetchVideos(true);
                
                setTimeout(() => {
                    ptrContainer.style.transform = 'translateY(-100%)';
                    spinnerIcon.classList.remove('fa-spin');
                    isRefreshing = false;
                }, 300);
            } else {
                ptrContainer.style.transform = 'translateY(-100%)';
            }
            
            touchStartY = 0;
            touchMoveY = 0;
        }

        function openSearch() {
            searchBar.classList.add('active');
            overlay.classList.add('active');
            isSearchActive = false;
            currentSearchTerm = '';
            searchInput.value = '';
            renderVideos();
            setTimeout(() => searchInput.focus(), 100);
        }

        function submitSearch() {
            currentSearchTerm = searchInput.value;
            isSearchActive = true;
            overlay.classList.remove('active');
            renderVideos();
        }

        function closeSearch() {
            searchBar.classList.remove('active');
            overlay.classList.remove('active');
            isSearchActive = false;
            currentSearchTerm = '';
            searchInput.value = '';
            renderVideos();
        }

        // Event listeners
        document.getElementById('searchIconBtn').addEventListener('click', openSearch);
        document.getElementById('searchCloseBtn').addEventListener('click', closeSearch);
        document.getElementById('searchSubmitBtn').addEventListener('click', submitSearch);
        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') submitSearch(); });
        
        // Touch events для pull-to-refresh
        document.addEventListener('touchstart', handleTouchStart, { passive: false });
        document.addEventListener('touchmove', handleTouchMove, { passive: false });
        document.addEventListener('touchend', handleTouchEnd);
        
        // Блокируем pull при скролле не вверху
        window.addEventListener('scroll', () => {
            if (window.scrollY > 0 && isPulling) {
                isPulling = false;
                ptrContainer.style.transform = 'translateY(-100%)';
            }
        });

        fetchVideos(true);
        setInterval(() => { if (!searchBar.classList.contains('active')) fetchVideos(false); }, 30000);
    </script>
</body>
</html>
