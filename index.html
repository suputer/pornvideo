<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Dezvi — видео лента</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 6px;
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 10px;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px 20px;
            z-index: 100;
        }

        .header-content {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #a855f7);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .search-icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            font-size: 18px;
        }

        .search-icon-btn:active {
            transform: scale(0.95);
        }

        /* Search Bar - плавающая сверху */
        .search-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            padding: 16px 20px;
            transform: translateY(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 150;
            border-bottom: 1px solid rgba(168, 85, 247, 0.3);
        }

        .search-bar.active {
            transform: translateY(0);
        }

        .search-bar-content {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-bar-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 12px 18px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }

        .search-bar-input:focus {
            border-color: #a855f7;
            background: rgba(255, 255, 255, 0.08);
        }

        .search-bar-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .search-submit-btn {
            background: #a855f7;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            color: white;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }

        .search-submit-btn:active {
            transform: scale(0.95);
        }

        .search-close-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
        }

        .search-close-btn:active {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(0.95);
        }

        /* Затемнение фона при открытом поиске (только до нажатия "Поиск") */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 140;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Pull to refresh */
        .ptr-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            z-index: 90;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            transform: translateY(-100%);
            transition: transform 0.2s ease;
        }

        .ptr-spinner {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
        }

        .ptr-spinner i {
            font-size: 20px;
            color: white;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .fa-spin {
            animation: spin 0.8s linear infinite;
        }

        /* Main content */
        .main-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        /* Video Grid */
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        /* Video Card */
        .video-card {
            background: #0a0a0a;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(30px);
            animation: cardAppear 0.5s ease forwards;
        }

        @keyframes cardAppear {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .video-card:active {
            transform: scale(0.98);
        }

        .preview-wrapper {
            position: relative;
            overflow: hidden;
            cursor: pointer;
            background: #1a1a1a;
        }

        .preview-img {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .video-card:active .preview-img {
            transform: scale(1.05);
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .preview-wrapper:active .play-overlay {
            opacity: 1;
        }

        .play-icon {
            width: 50px;
            height: 50px;
            background: rgba(168, 85, 247, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .video-info {
            padding: 16px;
        }

        .video-title {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: #ffffff;
        }

        .watch-btn {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .watch-btn:active {
            transform: scale(0.97);
        }

        /* Skeleton */
        .skeleton-card {
            background: #0a0a0a;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .skeleton-img {
            background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            aspect-ratio: 16/9;
        }

        .skeleton-text {
            padding: 16px;
        }

        .skeleton-title {
            height: 20px;
            background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .skeleton-btn {
            height: 44px;
            background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 12px;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .empty-text {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .error-state {
            text-align: center;
            padding: 80px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 30px;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .retry-btn {
            margin-top: 20px;
            padding: 10px 24px;
            background: #7c3aed;
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        .retry-btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 640px) {
            .main-content {
                padding: 16px;
            }
            .videos-grid {
                gap: 16px;
            }
            .logo {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="ptr-container" id="ptrContainer">
        <div class="ptr-spinner">
            <i class="fas fa-sync-alt"></i>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="search-bar" id="searchBar">
        <div class="search-bar-content">
            <button class="search-close-btn" id="searchCloseBtn">
                <i class="fas fa-times"></i>
            </button>
            <input type="text" class="search-bar-input" id="searchInput" placeholder="Поиск видео..." autocomplete="off">
            <button class="search-submit-btn" id="searchSubmitBtn">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </div>

    <div class="header">
        <div class="header-content">
            <div class="logo">Dezvi</div>
            <button class="search-icon-btn" id="searchIconBtn">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </div>

    <div class="main-content">
        <div id="videosContainer"></div>
    </div>

    <script>
        const API_URL = 'http://94.156.237.255:5000/videos';
        let allVideos = [];
        let isLoading = false;
        let currentSearchTerm = '';
        let isSearchActive = false; // Режим поиска активен (показываем только отфильтрованные)
        
        // DOM элементы
        const searchBar = document.getElementById('searchBar');
        const overlay = document.getElementById('overlay');
        const searchInput = document.getElementById('searchInput');
        const searchIconBtn = document.getElementById('searchIconBtn');
        const searchCloseBtn = document.getElementById('searchCloseBtn');
        const searchSubmitBtn = document.getElementById('searchSubmitBtn');
        const videosContainer = document.getElementById('videosContainer');
        
        // Pull to refresh
        let touchStartY = 0;
        let touchMoveY = 0;
        let isPulling = false;
        let isRefreshing = false;
        const ptrContainer = document.getElementById('ptrContainer');

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function showSkeleton() {
            videosContainer.innerHTML = `
                <div class="videos-grid">
                    ${Array(6).fill(0).map(() => `
                        <div class="skeleton-card">
                            <div class="skeleton-img"></div>
                            <div class="skeleton-text">
                                <div class="skeleton-title"></div>
                                <div class="skeleton-btn"></div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderVideos() {
            let videosToRender = allVideos;
            
            if (isSearchActive && currentSearchTerm.trim() !== '') {
                videosToRender = allVideos.filter(video => 
                    video.title.toLowerCase().includes(currentSearchTerm.toLowerCase())
                );
            }
            
            if (videosToRender.length === 0 && allVideos.length > 0 && isSearchActive && currentSearchTerm !== '') {
                videosContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon"><i class="fas fa-search"></i></div>
                        <div class="empty-title">Ничего не найдено</div>
                        <div class="empty-text">Попробуйте другой запрос</div>
                    </div>
                `;
                return;
            }
            
            if (videosToRender.length === 0) {
                videosContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon"><i class="fas fa-video"></i></div>
                        <div class="empty-title">Нет видео</div>
                        <div class="empty-text">Добавьте видео через Telegram-бота</div>
                    </div>
                `;
                return;
            }

            videosContainer.innerHTML = `
                <div class="videos-grid">
                    ${videosToRender.map((video, index) => `
                        <div class="video-card" style="animation-delay: ${index * 0.03}s">
                            <div class="preview-wrapper" onclick="window.open('${escapeHtml(video.url)}', '_blank')">
                                <img class="preview-img" src="data:image/jpeg;base64,${video.preview_base64}" alt="${escapeHtml(video.title)}" loading="lazy">
                                <div class="play-overlay">
                                    <div class="play-icon"><i class="fas fa-play"></i></div>
                                </div>
                            </div>
                            <div class="video-info">
                                <div class="video-title">${escapeHtml(video.title)}</div>
                                <a href="${escapeHtml(video.url)}" target="_blank" class="watch-btn">
                                    <i class="fas fa-play-circle" style="margin-right: 6px;"></i> Смотреть
                                </a>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function fetchVideos(showSkeletonEffect = true) {
            if (isLoading) return;
            isLoading = true;
            
            if (showSkeletonEffect) showSkeleton();

            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                allVideos = await response.json();
                renderVideos();
            } catch (error) {
                console.error('Ошибка:', error);
                videosContainer.innerHTML = `
                    <div class="error-state">
                        <div class="empty-icon"><i class="fas fa-exclamation-triangle"></i></div>
                        <div class="empty-title">Ошибка загрузки</div>
                        <div class="empty-text">Не удалось подключиться к серверу</div>
                        <button class="retry-btn" onclick="location.reload()"><i class="fas fa-redo-alt"></i> Повторить</button>
                    </div>
                `;
            } finally {
                isLoading = false;
            }
        }

        // Открыть поиск (показываем затемнение)
        function openSearch() {
            searchBar.classList.add('active');
            overlay.classList.add('active');
            isSearchActive = false;
            currentSearchTerm = '';
            searchInput.value = '';
            renderVideos();
            setTimeout(() => searchInput.focus(), 100);
        }

        // Выполнить поиск (убираем затемнение, оставляем поисковую строку)
        function submitSearch() {
            currentSearchTerm = searchInput.value;
            isSearchActive = true;
            overlay.classList.remove('active'); // Убираем затемнение!
            renderVideos();
        }

        // Закрыть поиск полностью
        function closeSearch() {
            searchBar.classList.remove('active');
            overlay.classList.remove('active');
            isSearchActive = false;
            currentSearchTerm = '';
            searchInput.value = '';
            renderVideos();
        }

        // Event listeners
        searchIconBtn.addEventListener('click', openSearch);
        searchCloseBtn.addEventListener('click', closeSearch);
        searchSubmitBtn.addEventListener('click', submitSearch);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitSearch();
        });

        // Pull to refresh
        function handleTouchStart(e) {
            if (window.scrollY === 0 && !isRefreshing && !searchBar.classList.contains('active')) {
                touchStartY = e.touches[0].clientY;
                isPulling = true;
            }
        }

        function handleTouchMove(e) {
            if (!isPulling || isRefreshing) return;
            touchMoveY = e.touches[0].clientY;
            const pullDistance = touchMoveY - touchStartY;
            if (pullDistance > 0 && window.scrollY === 0) {
                e.preventDefault();
                ptrContainer.style.transform = `translateY(${Math.min(pullDistance, 80)}px)`;
            }
        }

        async function handleTouchEnd(e) {
            if (!isPulling || isRefreshing) {
                isPulling = false;
                ptrContainer.style.transform = 'translateY(-100%)';
                return;
            }
            isPulling = false;
            const pullDistance = touchMoveY - touchStartY;
            if (pullDistance > 60) {
                isRefreshing = true;
                ptrContainer.style.transform = 'translateY(40px)';
                const spinnerIcon = ptrContainer.querySelector('i');
                spinnerIcon.classList.add('fa-spin');
                await fetchVideos(true);
                setTimeout(() => {
                    ptrContainer.style.transform = 'translateY(-100%)';
                    spinnerIcon.classList.remove('fa-spin');
                    isRefreshing = false;
                }, 300);
            } else {
                ptrContainer.style.transform = 'translateY(-100%)';
            }
            touchStartY = 0;
            touchMoveY = 0;
        }

        document.addEventListener('touchstart', handleTouchStart, { passive: false });
        document.addEventListener('touchmove', handleTouchMove, { passive: false });
        document.addEventListener('touchend', handleTouchEnd);
        
        window.addEventListener('scroll', () => {
            if (window.scrollY > 0 && isPulling) {
                isPulling = false;
                ptrContainer.style.transform = 'translateY(-100%)';
            }
        });

        setInterval(() => {
            if (!isRefreshing && !searchBar.classList.contains('active')) {
                fetchVideos(false);
            }
        }, 30000);
        
        fetchVideos(true);
    </script>
</body>
</html>
